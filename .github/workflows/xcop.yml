---
# yamllint disable rule:line-length
name: xcop
'on':
  push:
    branches:
      - master
    paths:
      - '**.xml'
      - '.github/workflows/xcop.yml'
  pull_request:
    branches:
      - master
jobs:
  xcop:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: g4s8/xcop-action@1.0.1
