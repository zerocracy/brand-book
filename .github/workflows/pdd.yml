---
# yamllint disable rule:line-length
name: pdd
'on':
  push:
    branches:
      - master
    paths:
      - '.github/workflows/pdd.yml'
  pull_request:
    branches:
      - master
jobs:
  pdd:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
      - run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libmagic-dev
      - run: gem install pdd
      - run: pdd -f /dev/null
