---
# yamllint disable rule:line-length
name: latexmk
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  latexmk:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: wget -O molot-regular.ttf https://www.yegor256.com/fonts/molot/molot-regular.ttf
      - uses: yegor256/latexmk-action@0.20.0
        with:
          opts: -pdf
          debs: fonts-noto-core fonts-noto-extra
          depends: DEPENDS.txt
      - uses: actions/upload-artifact@v7
        with:
          name: brand-book-pdf
          path: brand-book.pdf
      - run: |
          mkdir gh-pages
          cp brand-book.pdf gh-pages
      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: gh-pages
          clean: true
        if: github.ref == 'refs/heads/master'
